<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="薪資管理">
<title>薪資管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a0a0a;color:#ddd;font-family:'Noto Sans TC',sans-serif;overflow:hidden;}
input,select,button{font-family:inherit;font-size:inherit;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;display:none;}
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;display:none;}
input[type=number]{-moz-appearance:textfield;}
input:focus,select:focus{outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#111;border-bottom:1px solid #1e1e1e;flex-shrink:0;flex-wrap:wrap;gap:8px;position:relative;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:32px;height:32px;background:linear-gradient(135deg,#c8953a,#f0c060);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#111;}
.nav-title{font-size:14px;font-weight:700;color:#eee;}
.saved-badge{font-size:11px;color:#6dd6a0;background:rgba(109,214,160,0.12);border:1px solid rgba(109,214,160,0.3);border-radius:20px;padding:3px 10px;transition:opacity 0.5s;font-family:monospace;}
.nav-links{display:flex;gap:4px;}
.nav-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid transparent;border-radius:8px;background:transparent;color:#555;cursor:pointer;font-size:12px;transition:all 0.15s;}
.nav-btn.active{background:#1a1a1a;color:#f0c060;border-color:#2a2200;}

/* MAIN */
main{flex:1;overflow-y:auto;padding-bottom:40px;}
.page{max-width:860px;margin:0 auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;}

/* CONFIG ROW */
.config-row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.config-group{display:flex;flex-direction:column;gap:4px;}
.config-label{font-size:11px;color:#555;letter-spacing:0.08em;text-transform:uppercase;}
.input-pill{display:flex;align-items:center;border:1px solid #252525;border-radius:8px;overflow:hidden;background:#111;}
.pill-pre{padding:0 10px;color:#555;font-size:12px;font-family:monospace;border-right:1px solid #252525;background:#181818;align-self:stretch;display:flex;align-items:center;}
.pill-input{border:none;background:transparent;color:#eee;padding:8px 10px;font-size:14px;width:100px;font-family:monospace;}
.hint{font-size:11px;color:#c8953a;font-family:monospace;}
select.styled{border:1px solid #252525;border-radius:8px;background:#111;color:#ccc;padding:8px 10px;font-size:13px;}
.stat-chips{margin-left:auto;display:flex;align-items:center;background:#111;border:1px solid #252525;border-radius:20px;padding:5px 12px;gap:0;}
.stat-chip{display:flex;align-items:baseline;gap:3px;}
.stat-n{font-size:15px;font-weight:700;color:#eee;font-family:monospace;}
.stat-u{font-size:11px;color:#555;}
.stat-div{width:1px;height:14px;background:#2a2a2a;margin:0 9px;}

/* SUB TABS */
.sub-tab-row{display:flex;gap:6px;}
.sub-tab{padding:6px 14px;border:1px solid #222;border-radius:8px;background:transparent;color:#555;cursor:pointer;font-size:13px;}
.sub-tab.active{background:#181818;color:#f0c060;border-color:#3a2c00;}

/* OT TABLE */
.table-wrap{border:1px solid #1a1a1a;border-radius:12px;overflow:hidden;}
.t-head{background:#141414;font-size:11px;color:#444;text-transform:uppercase;letter-spacing:0.06em;}
.t-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #141414;transition:background 0.1s;}
.t-row:hover{background:rgba(255,255,255,0.02);}
.t-row.weekend{background:rgba(255,255,255,0.015);}
.t-row.has-data{background:rgba(200,149,58,0.06);}
.t-row.is-today{background:rgba(80,160,255,0.12);border-left:3px solid #70a8ff;}
.col0{width:84px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.col1{width:78px;flex-shrink:0;}
.col2{width:104px;flex-shrink:0;}
.col3{flex:1;}
.col4{width:86px;flex-shrink:0;text-align:right;}
.today-dot{width:6px;height:6px;border-radius:50%;background:#70a8ff;flex-shrink:0;}
.dow-badge{width:21px;height:21px;border:1px solid;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.date-text{font-family:monospace;font-size:13px;color:#999;}
.inline-field{display:flex;align-items:center;border:1px solid #222;border-radius:6px;background:#0d0d0d;overflow:hidden;max-width:76px;}
.hours-input{border:none;background:transparent;color:#eee;padding:5px 7px;font-size:14px;width:46px;font-family:monospace;text-align:center;}
.h-unit{color:#444;font-size:11px;padding-right:5px;}
.toggle-pair{display:flex;gap:4px;}
.t-btn{padding:5px 7px;border:1px solid #222;border-radius:5px;background:transparent;color:#444;cursor:pointer;font-size:11px;transition:all 0.1s;}
.t-btn.wd{background:#0e1f0e;color:#6dc06d;border-color:#2a4a2a;}
.t-btn.hd{background:#1f0e0e;color:#e07070;border-color:#4a2a2a;}
.note-in{width:100%;border:none;border-bottom:1px solid #1e1e1e;background:transparent;color:#777;padding:5px 2px;font-size:12px;}
.pay-amt{font-family:monospace;font-size:13px;font-weight:600;color:#c8953a;}
.pay-dash{color:#2a2a2a;}

/* SUMMARY */
.summary-wrap{display:flex;flex-direction:column;gap:12px;}
.big-card{background:linear-gradient(135deg,#181200,#201800);border:1px solid #3a2c00;border-radius:16px;padding:20px;}
.big-card-label{font-size:11px;color:#666;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;text-align:center;}
.big-card-amt{font-size:32px;font-weight:900;color:#f0c060;font-family:monospace;text-align:center;}
.big-card-sub{font-size:12px;color:#555;margin-top:5px;font-family:monospace;text-align:center;}
.big-card-stats{display:flex;border-top:1px solid #2a2200;padding-top:14px;margin-top:16px;}
.big-stat{flex:1;text-align:center;}
.big-stat-v{font-size:16px;font-weight:700;color:#e8d080;font-family:monospace;}
.big-stat-l{font-size:11px;color:#555;margin-top:3px;}
.list-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;}
.list-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #161616;}
.list-total{display:flex;justify-content:space-between;padding:10px 14px;background:#161200;border-top:1px solid #2a2200;}
.type-pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.pill-wd{background:#0e1f0e;color:#6dc06d;}
.pill-hd{background:#1f0e0e;color:#e07070;}
.empty{text-align:center;color:#444;padding:40px 0;font-size:13px;}
.rate-note{font-size:11px;color:#333;text-align:center;}

/* SALARY */
.salary-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.sal-section{border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.sal-section-header{display:flex;justify-content:space-between;align-items:center;}
/* sal-item moved below */
.sal-item-row1{display:flex;align-items:center;gap:6px;}
.sal-name-input{flex:1;background:transparent;border:none;border-bottom:1px solid #2e2e2e;padding:2px 0;color:#bbb;font-size:13px;}
.sal-del-btn{width:24px;height:24px;background:transparent;border:1px solid #2a2a2a;border-radius:5px;color:#444;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sal-item-row2{display:flex;align-items:center;gap:6px;overflow:hidden;}
.sal-nt{font-size:11px;color:#555;flex-shrink:0;}
.sal-amt-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid #2e2e2e;border-radius:6px;padding:8px 12px;color:#f0e080;font-size:18px;font-family:monospace;text-align:right;font-weight:600;-webkit-appearance:none;appearance:none;min-width:0;}
.add-item-btn{align-self:flex-start;background:transparent;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;opacity:0.7;border-style:dashed;border-width:1px;}
.drag-handle{width:28px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:grab;flex-shrink:0;padding:0 4px;opacity:0.4;}
.drag-handle:active{cursor:grabbing;opacity:0.8;}
.drag-handle span{display:block;width:14px;height:2px;background:#888;border-radius:2px;}
.sal-item{background:rgba(0,0,0,0.25);border:1px solid #222;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow:hidden;transition:opacity 0.15s,transform 0.15s;}
.sal-item.dragging{opacity:0.4;transform:scale(0.98);}
.sal-item.drag-over{border-color:#f0a060;background:rgba(240,160,96,0.12);}

/* TAX CARD */
.tax-card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px;}
.tax-card-title{font-size:13px;font-weight:700;color:#888;margin-bottom:12px;}
.tax-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.tax-item{display:flex;flex-direction:column;gap:4px;}
.tax-label{font-size:11px;color:#555;}
.tax-val{font-size:15px;font-weight:700;font-family:monospace;}
.tax-total-row{grid-column:1/-1;border-top:1px solid #2a2a2a;padding-top:12px;display:flex;flex-direction:column;gap:4px;}
.withhold-box{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:10px;padding:13px;}
.withhold-title{font-size:11px;color:#555;margin-bottom:10px;}
.withhold-row{display:flex;align-items:stretch;}
.withhold-method{flex:1;display:flex;flex-direction:column;gap:5px;}
.withhold-div{width:1px;background:#2a2a2a;margin:0 13px;}
.wm-label{font-size:11px;color:#666;}
.wm-amt{font-size:14px;font-weight:700;color:#e07070;font-family:monospace;}
.wm-takehome{font-size:11px;color:#6dd6a0;font-family:monospace;}
.withhold-note{font-size:10px;color:#333;margin-top:8px;}

/* ANNUAL */
.annual-header{text-align:center;padding:6px 0 2px;}
.annual-year{font-size:24px;font-weight:900;color:#f0c060;font-family:monospace;}
.annual-sub{font-size:12px;color:#555;margin-top:3px;}
.annual-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.annual-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:13px 15px;}
.annual-card-label{font-size:11px;color:#555;margin-bottom:5px;}
.annual-card-val{font-size:17px;font-weight:700;font-family:monospace;}
.refund-card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px;}
.refund-title{font-size:13px;font-weight:700;color:#888;margin-bottom:14px;}
.refund-grid{display:flex;gap:0;}
.refund-col{flex:1;display:flex;flex-direction:column;gap:7px;}
.refund-col:nth-child(2){padding-left:16px;border-left:1px solid #2a2a2a;}
.refund-col-title{font-size:12px;color:#666;margin-bottom:4px;}
.refund-row{display:flex;justify-content:space-between;align-items:center;}
.refund-sep{border-top:1px solid #2a2a2a;padding-top:8px;margin-top:4px;}
.rl{font-size:12px;color:#666;}
.rv{font-size:12px;font-family:monospace;color:#aaa;}
.deduct-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px;}
.deduct-title{font-size:12px;color:#555;margin-bottom:8px;}
.deduct-row{display:flex;justify-content:space-between;padding:4px 0;}
.deduct-sep{border-top:1px solid #2a2a2a;margin-top:6px;padding-top:10px;}
.deduct-note{font-size:10px;color:#333;margin-top:8px;line-height:1.6;}
.annual-table{background:#111;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;}
.ann-head{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #222;font-size:11px;color:#444;text-transform:uppercase;}
.ann-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #161616;}

/* CHART */
.chart-card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px 14px;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:13px;font-weight:700;color:#888;}
.chart-sub{font-size:10px;color:#444;}
svg.chart{overflow:visible;display:block;width:100%;}

/* EXPENSE */
/* Category picker panel */
.cat-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;}
.cat-picker-panel{background:#161616;border-radius:16px 16px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:16px 12px 32px;}
.cat-picker-title{font-size:13px;font-weight:700;color:#888;text-align:center;margin-bottom:12px;}
.cat-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-picker-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:10px;border:1px solid #2a2a2a;cursor:pointer;transition:all 0.1s;background:#111;}
.cat-picker-item:active{transform:scale(0.95);}
.cat-picker-item.selected{border-width:2px;}
.cat-emoji{font-size:22px;line-height:1;}
.cat-label{font-size:10px;text-align:center;line-height:1.2;}
.exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.exp-item{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.exp-item-name{font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-input-row{display:flex;align-items:center;gap:4px;}
.exp-nt{font-size:11px;color:#555;flex-shrink:0;}
.exp-input{flex:1;background:transparent;border:none;border-bottom:1px solid #2a2a2a;padding:4px 0;color:#f0e080;font-size:16px;font-family:monospace;text-align:right;min-width:0;}
.exp-total-card{background:linear-gradient(135deg,#0d1a0d,#0a150a);border:1px solid #2a4a2a;border-radius:14px;padding:18px 20px;}
.exp-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.exp-cat-section{background:#111;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;}
.exp-cat-header{padding:10px 14px;background:#161616;font-size:12px;font-weight:700;color:#888;letter-spacing:0.05em;}
.exp-cat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #161616;}
.exp-bar-wrap{height:6px;background:#1a1a1a;border-radius:3px;margin-top:3px;overflow:hidden;}
.exp-bar{height:100%;border-radius:3px;transition:width 0.3s;}

/* CHART BAR */
.bar-chart-wrap{overflow-x:auto;padding-bottom:4px;}
svg.bar-chart{display:block;}

/* LOCK SCREEN */
#lock-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;}
.lock-logo{width:64px;height:64px;background:linear-gradient(135deg,#c8953a,#f0c060);border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;color:#111;}
.lock-title{font-size:18px;font-weight:700;color:#eee;}
.lock-sub{font-size:12px;color:#555;}
.lock-dots{display:flex;gap:14px;margin:8px 0;}
.lock-dot{width:14px;height:14px;border-radius:50%;border:2px solid #333;background:transparent;transition:all 0.15s;}
.lock-dot.filled{background:#f0c060;border-color:#f0c060;}
.lock-dot.error{background:#e07070;border-color:#e07070;}
.lock-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.lock-key{width:72px;height:72px;border-radius:50%;border:1px solid #2a2a2a;background:#161616;color:#eee;font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;-webkit-tap-highlight-color:transparent;}
.lock-key:active{background:#2a2a2a;transform:scale(0.93);}
.lock-key.del{font-size:16px;color:#888;}
.lock-shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dash-card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.dash-card.full{grid-column:1/-1;}
.dash-card.accent-green{border-color:#2a4a2a;background:linear-gradient(135deg,#0d1a0d,#0a150a);}
.dash-card.accent-red{border-color:#4a2a2a;background:linear-gradient(135deg,#1a0d0d,#150a0a);}
.dash-card.accent-gold{border-color:#3a2c00;background:linear-gradient(135deg,#181200,#201800);}
.dash-label{font-size:11px;color:#555;letter-spacing:0.05em;}
.dash-val{font-size:22px;font-weight:800;font-family:monospace;}
.dash-sub{font-size:10px;color:#444;margin-top:2px;}
.dash-section-title{font-size:12px;font-weight:700;color:#666;letter-spacing:0.06em;text-transform:uppercase;padding:6px 0 4px;}

/* LOADING */
#loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
.load-bar{width:120px;height:3px;background:#1a1a1a;border-radius:4px;overflow:hidden;}
.load-fill{width:60%;height:100%;background:linear-gradient(90deg,#c8953a,#f0c060);border-radius:4px;animation:loadSlide 1s ease infinite alternate;}
@keyframes loadSlide{from{transform:translateX(-20px)}to{transform:translateX(30px)}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-logo">薪</div>
  <div class="lock-title">薪資管理系統</div>
  <div class="lock-sub">請輸入密碼</div>
  <div class="lock-dots" id="lock-dots">
    <div class="lock-dot"></div><div class="lock-dot"></div>
    <div class="lock-dot"></div><div class="lock-dot"></div>
    <div class="lock-dot"></div><div class="lock-dot"></div>
  </div>
  <div class="lock-pad">
    <button class="lock-key" onclick="lockInput('1')">1</button>
    <button class="lock-key" onclick="lockInput('2')">2</button>
    <button class="lock-key" onclick="lockInput('3')">3</button>
    <button class="lock-key" onclick="lockInput('4')">4</button>
    <button class="lock-key" onclick="lockInput('5')">5</button>
    <button class="lock-key" onclick="lockInput('6')">6</button>
    <button class="lock-key" onclick="lockInput('7')">7</button>
    <button class="lock-key" onclick="lockInput('8')">8</button>
    <button class="lock-key" onclick="lockInput('9')">9</button>
    <button class="lock-key" style="visibility:hidden"></button>
    <button class="lock-key" onclick="lockInput('0')">0</button>
    <button class="lock-key del" onclick="lockDel()">⌫</button>
  </div>
</div>

<div id="loading">
  <div style="width:44px;height:44px;background:linear-gradient(135deg,#c8953a,#f0c060);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#111;">薪</div>
  <div style="color:#555;font-size:13px;">載入資料中…</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<div id="app" class="hidden">
  <nav>
    <div class="nav-brand">
      <div class="nav-logo">薪</div>
      <span class="nav-title">薪資管理系統</span>
    </div>
    <div class="saved-badge" id="saved-badge" style="opacity:0">☁ 已儲存</div>
    <div class="nav-links">
      <button class="nav-btn" onclick="showPage('home')">🏠 總覽</button>
      <button class="nav-btn" onclick="showPage('ot')">⏱ 加班</button>
      <button class="nav-btn" onclick="showPage('salary')">💰 薪資單</button>
      <button class="nav-btn" onclick="showPage('annual')">📈 年度</button>
      <button class="nav-btn" onclick="showPage('expense')">💸 花費</button>
    </div>
  </nav>
  <main id="main-content"></main>
</div>

<script>
// ══════════════════════════════════════════════
// STORAGE (Supabase - cross-device sync)

// TAIWAN TAX

const W_TABLE = [
  {max:84501,rate:0,base:0},{max:111000,rate:0.05,base:0},
  {max:148000,rate:0.10,base:2775},{max:185000,rate:0.15,base:8275},
  {max:222000,rate:0.20,base:15775},{max:Infinity,rate:0.30,base:35775}
];
function calcWT(t) {
  for (let i=0;i<W_TABLE.length;i++) {
    if (t<=W_TABLE[i].max) {
      if (i===0) return 0;
      const p=W_TABLE[i-1];
      return Math.round(p.base+(t-(i===1?0:W_TABLE[i-2].max))*p.rate);
    }
  }
  const l=W_TABLE[W_TABLE.length-2];
  return Math.round(W_TABLE[W_TABLE.length-1].base+(t-l.max)*l.rate);
}
function calc5(t) { return t>84501?Math.round(t*0.05):0; }

const TAX_BRACKETS=[
  {th:0,r:0.05},{th:560000,r:0.12},{th:1260000,r:0.20},{th:2520000,r:0.30},{th:4720000,r:0.40}
];
const DEDUCTION = 131000+218000+97000; // 446000
function calcAnnualTax(income) {
  const net = Math.max(0, income - DEDUCTION);
  let tax=0;
  for (let i=TAX_BRACKETS.length-1;i>=0;i--) {
    if (net>TAX_BRACKETS[i].th) {
      tax=(net-TAX_BRACKETS[i].th)*TAX_BRACKETS[i].r;
      for (let j=i-1;j>=0;j--) tax+=(TAX_BRACKETS[j+1].th-TAX_BRACKETS[j].th)*TAX_BRACKETS[j].r;
      break;
    }
  }
  return Math.round(tax);
}

// OT CALC
// ══════════════════════════════════════════════
function calcOT(hw, h, type) {
  if (h<=0||hw<=0) return 0;
  if (type==='holiday') return hw*2*h;
  return hw*1.34*Math.min(h,2)+hw*1.67*Math.max(0,h-2);
}

// DATE HELPERS

function toDS(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function today() { return toDS(new Date()); }
function dow(ds) { return new Date(ds+'T00:00:00').getDay(); }
const DOWL = ['日','一','二','三','四','五','六'];

function getOTPeriods() {
  const now=new Date();
  return Array.from({length:12},(_,i)=>{
    const ref=new Date(now.getFullYear(),now.getMonth()-i,1);
    const s=new Date(ref.getFullYear(),ref.getMonth()-1,26);
    const e=new Date(ref.getFullYear(),ref.getMonth(),25);
    return {
      key:toDS(s), start:toDS(s), end:toDS(e),
      label:s.getFullYear()+'/'+String(s.getMonth()+1).padStart(2,'0')+'/26 ～ '+e.getFullYear()+'/'+String(e.getMonth()+1).padStart(2,'0')+'/25'
    };
  });
}
function getDates(start,end) {
  const dates=[],cur=new Date(start+'T00:00:00'),endD=new Date(end+'T00:00:00');
  while(cur<=endD){dates.push(toDS(cur));cur.setDate(cur.getDate()+1);}
  return dates;
}
function mk(y,m){return y+'-'+String(m).padStart(2,'0');}
function curMK(){const n=new Date();return mk(n.getFullYear(),n.getMonth()+1);}
function getMonthList(){
  const now=new Date();
  const start=new Date(2018,0,1); // Jan 2018
  const months=[];
  let cur=new Date(now.getFullYear(),now.getMonth(),1);
  while(cur>=start){
    months.push({key:mk(cur.getFullYear(),cur.getMonth()+1),label:cur.getFullYear()+' 年 '+(cur.getMonth()+1)+' 月'});
    cur.setMonth(cur.getMonth()-1);
  }
  return months;
}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}

// RENDER ENGINE
// ══════════════════════════════════════════════
function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='class') el.className=v;
    else if (k==='style') el.style.cssText=v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null||c===false) continue;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  }
  return el;
}

// ── drag-and-drop state ──
let dragSec=null, dragIdx=null;

// ── salary item row with drag handle ──
function mkSalItem(item, sec, idx, items) {
  const el = h('div',{class:'sal-item',draggable:'true'},
    h('div',{class:'sal-item-row1'},
      // drag handle
      h('div',{class:'drag-handle'},
        h('span'),h('span'),h('span')
      ),
      h('input',{class:'sal-name-input',type:'text',placeholder:'項目名稱',value:item.name,
        oninput(e){item.name=e.target.value;triggerSave();}
      }),
      h('button',{class:'sal-del-btn',onclick(){
        const d=STATE.salaryData[STATE.salaryMonth]||(STATE.salaryData[STATE.salaryMonth]=defSalaryMonth());
        d[sec]=d[sec].filter(i=>i.id!==item.id);
        triggerSave();renderPage();
      }},'×')
    ),
    h('div',{class:'sal-item-row2'},
      h('span',{class:'sal-nt'},'NT$'),
      h('input',{class:'sal-amt-input',type:'number',inputmode:'decimal',placeholder:'',value:item.amount,
        oninput(e){item.amount=e.target.value;triggerSave();}
      })
    )
  );

  // Desktop drag events
  el.addEventListener('dragstart', e=>{
    dragSec=sec; dragIdx=idx;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); });
  el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', ()=>{ el.classList.remove('drag-over'); });
  el.addEventListener('drop', e=>{
    e.preventDefault();
    el.classList.remove('drag-over');
    if (dragSec!==sec||dragIdx===null||dragIdx===idx) return;
    const d=STATE.salaryData[STATE.salaryMonth];
    const arr=d[sec];
    const moved=arr.splice(dragIdx,1)[0];
    arr.splice(idx,0,moved);
    dragIdx=null; dragSec=null;
    triggerSave(); renderPage();
  });

  // Touch drag events (mobile)
  let touchStartY=0, touchClone=null, touchTargetIdx=null;
  el.addEventListener('touchstart', e=>{
    if(!e.target.closest('.drag-handle')) return;
    e.preventDefault();
    touchStartY=e.touches[0].clientY;
    dragSec=sec; dragIdx=idx;
    el.classList.add('dragging');
    // create visual clone
    touchClone=el.cloneNode(true);
    touchClone.style.cssText='position:fixed;z-index:9999;left:'+el.getBoundingClientRect().left+'px;top:'+el.getBoundingClientRect().top+'px;width:'+el.offsetWidth+'px;opacity:0.85;pointer-events:none;transition:none;';
    document.body.appendChild(touchClone);
  },{passive:false});

  el.addEventListener('touchmove', e=>{
    if(!touchClone) return;
    e.preventDefault();
    const dy=e.touches[0].clientY-touchStartY;
    touchClone.style.transform='translateY('+dy+'px)';
    // find target
    const elY=e.touches[0].clientY;
    const siblings=[...el.parentElement.querySelectorAll('.sal-item')];
    siblings.forEach((s,si)=>{
      const r=s.getBoundingClientRect();
      if(elY>r.top&&elY<r.bottom){ touchTargetIdx=si; s.classList.add('drag-over');}
      else s.classList.remove('drag-over');
    });
  },{passive:false});

  el.addEventListener('touchend', ()=>{
    if(!touchClone) return;
    touchClone.remove(); touchClone=null;
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'));
    if(dragSec===sec&&touchTargetIdx!==null&&touchTargetIdx!==dragIdx){
      const d=STATE.salaryData[STATE.salaryMonth];
      const arr=d[sec];
      const moved=arr.splice(dragIdx,1)[0];
      arr.splice(touchTargetIdx,0,moved);
      triggerSave(); renderPage();
    }
    dragSec=null; dragIdx=null; touchTargetIdx=null;
  });

  return el;
}

function renderChart(chartRows) {
  const W=320,H=150,PL=46,PR=14,PT=14,PB=28;
  const IW=W-PL-PR,IH=H-PT-PB;
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const filled=chartRows.filter(r=>r.net!==null);
  if (!filled.length) return h('div',{class:'empty'},'尚無月薪資料');

  const vals=filled.map(r=>r.net);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const rng=maxV-minV,pad=rng>0?rng*0.15:maxV*0.1||1000;
  const yMin=Math.max(0,minV-pad),yMax=maxV+pad;
  const xP=m=>PL+((m-1)/11)*IW;
  const yP=v=>PT+IH-((v-yMin)/(yMax-yMin))*IH;
  const fY=v=>v>=10000?Math.round(v/1000)+'k':String(Math.round(v));

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('class','chart');

  // grid
  [yMin,(yMin+yMax)/2,yMax].forEach(v=>{
    const y=yP(v);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',PL);line.setAttribute('y1',y);line.setAttribute('x2',W-PR);line.setAttribute('y2',y);
    line.setAttribute('stroke','#1e1e1e');line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',PL-4);txt.setAttribute('y',y+4);txt.setAttribute('text-anchor','end');
    txt.setAttribute('fill','#444');txt.setAttribute('font-size','9');txt.setAttribute('font-family','monospace');
    txt.textContent=fY(v);
    svg.appendChild(txt);
  });

  // segments
  let seg=[];
  const segs=[];
  chartRows.forEach(r=>{
    if(r.net!==null){seg.push(r);}
    else{if(seg.length){segs.push(seg);seg=[];}}
  });
  if(seg.length)segs.push(seg);

  segs.forEach(sg=>{
    const coords=sg.map(r=>xP(r.month)+','+yP(r.net)).join(' ');
    const fx=xP(sg[0].month),lx=xP(sg[sg.length-1].month),bot=PT+IH;
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',fx+','+bot+' '+coords+' '+lx+','+bot);
    poly.setAttribute('fill','rgba(109,214,160,0.07)');
    svg.appendChild(poly);
    const pline=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    pline.setAttribute('points',coords);pline.setAttribute('fill','none');
    pline.setAttribute('stroke','#6dd6a0');pline.setAttribute('stroke-width','1.8');
    pline.setAttribute('stroke-linejoin','round');pline.setAttribute('stroke-linecap','round');
    svg.appendChild(pline);
  });

  // dots + tooltip
  let tipEl=null;
  chartRows.forEach(r=>{
    if(r.net===null)return;
    const cx=xP(r.month),cy=yP(r.net);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r','3.5');
    c.setAttribute('fill','#6dd6a0');c.setAttribute('stroke','#0a0a0a');c.setAttribute('stroke-width','1.5');
    svg.appendChild(c);
    // hit area
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',cx-14);rect.setAttribute('y',PT);rect.setAttribute('width','28');rect.setAttribute('height',IH+PB);
    rect.setAttribute('fill','transparent');
    const showTip=()=>{
      if(tipEl)svg.removeChild(tipEl);
      const tw=96,th=40,tx=Math.min(Math.max(cx-tw/2,PL),W-PR-tw),ty=cy-th-10;
      tipEl=document.createElementNS('http://www.w3.org/2000/svg','g');
      const bg2=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg2.setAttribute('x',tx);bg2.setAttribute('y',ty);bg2.setAttribute('width',tw);bg2.setAttribute('height',th);
      bg2.setAttribute('rx','5');bg2.setAttribute('fill','#1a1a1a');bg2.setAttribute('stroke','#2a2a2a');
      const t1=document.createElementNS('http://www.w3.org/2000/svg','text');
      t1.setAttribute('x',tx+tw/2);t1.setAttribute('y',ty+14);t1.setAttribute('text-anchor','middle');
      t1.setAttribute('fill','#aaa');t1.setAttribute('font-size','9');t1.textContent=r.month+'月 經常性收入';
      const t2=document.createElementNS('http://www.w3.org/2000/svg','text');
      t2.setAttribute('x',tx+tw/2);t2.setAttribute('y',ty+29);t2.setAttribute('text-anchor','middle');
      t2.setAttribute('fill','#6dd6a0');t2.setAttribute('font-size','12');t2.setAttribute('font-weight','600');
      t2.textContent='NT$ '+Math.round(r.net).toLocaleString('zh-TW');
      tipEl.appendChild(bg2);tipEl.appendChild(t1);tipEl.appendChild(t2);
      svg.appendChild(tipEl);
    };
    const hideTip=()=>{if(tipEl){svg.removeChild(tipEl);tipEl=null;}};
    rect.addEventListener('mouseenter',showTip);
    rect.addEventListener('mouseleave',hideTip);
    rect.addEventListener('touchstart',e=>{e.preventDefault();showTip();});
    rect.addEventListener('touchend',()=>setTimeout(hideTip,1800));
    svg.appendChild(rect);
  });

  // x labels
  chartRows.forEach((r,i)=>{
    if(i%2!==0&&i!==11)return;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',xP(r.month));t.setAttribute('y',H-4);t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','#444');t.setAttribute('font-size','9');
    t.textContent=MONTHS[r.month-1];
    svg.appendChild(t);
  });

  return svg;
}

function renderAnnual() {
  const year=new Date().getFullYear();
  let tTax=0,tNet=0,tW5=0,tWt=0;
  const rows=[],chartRows=[];
  for(let m=1;m<=12;m++){
    const key=mk(year,m),d=STATE.salaryData[key];
    if(d){
      // support both old and new data format
      const taxAdd=d.taxAdd||d.a||[];
      const taxDed=d.taxDed||[];
      const exempt=d.exempt||d.b||[];
      const other=d.other||d.c||[];
      const sumTaxAdd=sumItems(taxAdd),sumTaxDed=sumItems(taxDed);
      const taxable=Math.max(0,sumTaxAdd-sumTaxDed);
      const sumEx=sumItems(exempt),sumOth=sumItems(other);
      const net=taxable+sumEx-sumOth;
      const wt=calcWT(taxable),w5=calc5(taxable);
      tTax+=taxable;tNet+=net;tW5+=w5;tWt+=wt;
      rows.push({month:m,key,a:taxable,b:sumEx,c:sumOth,net,wt,w5});
      // chart: actual net = taxable + exempt - other deductions
      const chartNet = net;
      chartRows.push({month:m,net:chartNet});

function renderExpenseLineChart() {
  const monthList = getMonthList().reverse(); // oldest first
  const dataMonths = monthList.filter(m => STATE.expenseData[m.key]);
  if (dataMonths.length < 2) return h('div',{class:'empty'},'至少需要 2 個月的資料才能顯示趨勢');

  const W = 320, H = 160, PL = 50, PR = 14, PT = 14, PB = 28;
  const IW = W - PL - PR, IH = H - PT - PB;
  const vals = dataMonths.map(m => {
    const d = STATE.expenseData[m.key] || {};
    return EXP_CATS.reduce((s,c) => s + (Number(d[c.id])||0), 0);
  });
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const pad = (maxV - minV || 1) * 0.15;
  const yMin = Math.max(0, minV - pad), yMax = maxV + pad;
  const xP = i => PL + (i / (dataMonths.length - 1)) * IW;
  const yP = v => PT + IH - ((v - yMin) / (yMax - yMin)) * IH;
  const fY = v => v >= 10000 ? Math.round(v/1000) + 'k' : fmt(v);

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 ' + W + ' ' + H);
  svg.setAttribute('class','chart');

  // grid
  [yMin,(yMin+yMax)/2,yMax].forEach(v => {
    const y = yP(v);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',PL); line.setAttribute('y1',y);
    line.setAttribute('x2',W-PR); line.setAttribute('y2',y);
    line.setAttribute('stroke','#1e1e1e'); line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',PL-4); txt.setAttribute('y',y+4);
    txt.setAttribute('text-anchor','end'); txt.setAttribute('fill','#444');
    txt.setAttribute('font-size','9'); txt.setAttribute('font-family','monospace');
    txt.textContent = fY(v); svg.appendChild(txt);
  });

  // area + line
  const coords = dataMonths.map((_,i) => xP(i)+','+yP(vals[i])).join(' ');
  const area = PL+','+(PT+IH)+' '+coords+' '+xP(dataMonths.length-1)+','+(PT+IH);
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',area); poly.setAttribute('fill','rgba(224,112,112,0.07)');
  svg.appendChild(poly);
  const pline = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  pline.setAttribute('points',coords); pline.setAttribute('fill','none');
  pline.setAttribute('stroke','#e07070'); pline.setAttribute('stroke-width','1.8');
  pline.setAttribute('stroke-linejoin','round'); pline.setAttribute('stroke-linecap','round');
  svg.appendChild(pline);

  // dots + tooltip
  let tipEl = null;
  dataMonths.forEach((m,i) => {
    const cx = xP(i), cy = yP(vals[i]);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r','3.5');
    c.setAttribute('fill','#e07070'); c.setAttribute('stroke','#0a0a0a'); c.setAttribute('stroke-width','1.5');
    svg.appendChild(c);
    const hit = document.createElementNS('http://www.w3.org/2000/svg','rect');
    hit.setAttribute('x',cx-14); hit.setAttribute('y',PT);
    hit.setAttribute('width','28'); hit.setAttribute('height',IH+PB);
    hit.setAttribute('fill','transparent');
    const showTip = () => {
      if(tipEl) svg.removeChild(tipEl);
      const tw=90, th=38, tx=Math.min(Math.max(cx-tw/2,PL),W-PR-tw), ty=cy-th-8;
      tipEl = document.createElementNS('http://www.w3.org/2000/svg','g');
      const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('x',tx); bg.setAttribute('y',ty); bg.setAttribute('width',tw); bg.setAttribute('height',th);
      bg.setAttribute('rx','5'); bg.setAttribute('fill','#1a1a1a'); bg.setAttribute('stroke','#2a2a2a');
      const t1 = document.createElementNS('http://www.w3.org/2000/svg','text');
      t1.setAttribute('x',tx+tw/2); t1.setAttribute('y',ty+13); t1.setAttribute('text-anchor','middle');
      t1.setAttribute('fill','#aaa'); t1.setAttribute('font-size','9'); t1.textContent=m.label;
      const t2 = document.createElementNS('http://www.w3.org/2000/svg','text');
      t2.setAttribute('x',tx+tw/2); t2.setAttribute('y',ty+28); t2.setAttribute('text-anchor','middle');
      t2.setAttribute('fill','#e07070'); t2.setAttribute('font-size','12'); t2.setAttribute('font-weight','600');
      t2.textContent = 'NT$ '+fmt(vals[i]);
      tipEl.appendChild(bg); tipEl.appendChild(t1); tipEl.appendChild(t2); svg.appendChild(tipEl);
    };
    hit.addEventListener('mouseenter', showTip);
    hit.addEventListener('mouseleave', ()=>{ if(tipEl){svg.removeChild(tipEl);tipEl=null;} });
    hit.addEventListener('touchstart', e=>{e.preventDefault();showTip();},{passive:false});
    hit.addEventListener('touchend', ()=>setTimeout(()=>{if(tipEl){svg.removeChild(tipEl);tipEl=null;}},1800));
    svg.appendChild(hit);
  });

  // x labels (show every 3 months or fewer)
  const step = dataMonths.length > 12 ? Math.ceil(dataMonths.length/8) : (dataMonths.length > 6 ? 2 : 1);
  dataMonths.forEach((m,i) => {
    if (i % step !== 0 && i !== dataMonths.length-1) return;
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',xP(i)); txt.setAttribute('y',H-4);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('fill','#444'); txt.setAttribute('font-size','8');
    txt.textContent = m.key.slice(2).replace('-','/'); svg.appendChild(txt);
  });

  return svg;
}

function renderExpenseBarChart() {
  const mk2 = STATE.expenseMonth;
  const d = STATE.expenseData[mk2] || {};
  const items = EXP_CATS.map(c => ({...c, val: Number(d[c.id])||0})).filter(c => c.val > 0).sort((a,b)=>b.val-a.val);
  if (!items.length) return h('div',{class:'empty'},'本月尚無花費資料');

  const total = items.reduce((s,c)=>s+c.val,0);
  const maxV = items[0].val;
  const W = 320, barH = 20, gap = 6, PL = 60, PR = 60, labelW = PL, valW = PR;
  const H = items.length * (barH + gap) + 10;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('class','bar-chart');
  svg.style.width='100%'; svg.style.height=H+'px';

  items.forEach((item,i) => {
    const y = i * (barH + gap) + 5;
    const barW = Math.max(2, ((item.val / maxV) * (W - PL - PR)));
    // label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',PL-6); lbl.setAttribute('y',y+barH/2+4);
    lbl.setAttribute('text-anchor','end'); lbl.setAttribute('fill','#aaa'); lbl.setAttribute('font-size','10');
    lbl.textContent = item.name; svg.appendChild(lbl);
    // bar bg
    const barBg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    barBg.setAttribute('x',PL); barBg.setAttribute('y',y);
    barBg.setAttribute('width',W-PL-PR); barBg.setAttribute('height',barH);
    barBg.setAttribute('fill','#1a1a1a'); barBg.setAttribute('rx','4'); svg.appendChild(barBg);
    // bar fill
    const bar = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bar.setAttribute('x',PL); bar.setAttribute('y',y);
    bar.setAttribute('width',barW); bar.setAttribute('height',barH);
    bar.setAttribute('fill',item.color); bar.setAttribute('rx','4'); bar.setAttribute('opacity','0.8');
    svg.appendChild(bar);
    // value
    const val = document.createElementNS('http://www.w3.org/2000/svg','text');
    val.setAttribute('x',PL+barW+6); val.setAttribute('y',y+barH/2+4);
    val.setAttribute('fill','#888'); val.setAttribute('font-size','9'); val.setAttribute('font-family','monospace');
    val.textContent = fmt(item.val); svg.appendChild(val);
  });

  return svg;
}

// ── Expense drag state ──
let expDragIdx = null;

function showCatPicker(item, onSelect) {
  const overlay = document.createElement('div');
  overlay.className = 'cat-picker-overlay';
  const panel = document.createElement('div');
  panel.className = 'cat-picker-panel';
  const title = document.createElement('div');
  title.className = 'cat-picker-title';
  title.textContent = '選擇類別';
  panel.appendChild(title);
  const grid = document.createElement('div');
  grid.className = 'cat-picker-grid';
  EXP_CATS.forEach(cat => {
    const btn = document.createElement('div');
    btn.className = 'cat-picker-item' + (cat.id === item.catId ? ' selected' : '');
    btn.style.borderColor = cat.id === item.catId ? cat.color : '#2a2a2a';
    btn.style.background = cat.id === item.catId ? cat.color + '22' : '#111';
    const emoji = document.createElement('span');
    emoji.className = 'cat-emoji';
    emoji.textContent = cat.emoji;
    const label = document.createElement('span');
    label.className = 'cat-label';
    label.style.color = cat.color;
    label.textContent = cat.name;
    btn.appendChild(emoji);
    btn.appendChild(label);
    btn.addEventListener('click', () => {
      onSelect(cat);
      document.body.removeChild(overlay);
    });
    grid.appendChild(btn);
  });
  panel.appendChild(grid);
  overlay.appendChild(panel);
  overlay.addEventListener('click', e => { if(e.target === overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}

function mkExpRow(item, idx, items, mk2) {
  const cat = (item.catId ? EXP_CATS.find(c=>c.id===item.catId) : null) || EXP_CATS[EXP_CATS.length-1];
  const isSaving = item.catId === SAVING_CAT_ID;
  const el = h('div',{class:'sal-item',draggable:'true',
    style:'border-left:3px solid '+cat.color+(isSaving?';background:rgba(240,208,96,0.06)':'')},
    h('div',{class:'sal-item-row1'},
      h('div',{class:'drag-handle'},h('span'),h('span'),h('span')),
      // emoji category button
      h('button',{
        style:'background:'+cat.color+'22;border:1px solid '+cat.color+'66;border-radius:8px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;min-width:72px;',
        onclick(){
          showCatPicker(item, cat2=>{
            item.catId = cat2.id;
            if(item.name === cat.name) item.name = cat2.name;
            triggerSave(); renderPage();
          });
        }
      },
        h('span',{style:'font-size:16px'},cat.emoji),
        h('span',{style:'font-size:11px;color:'+cat.color},cat.name)
      ),
      // editable name
      h('input',{class:'sal-name-input',type:'text',placeholder:'備註...',value:item.name,
        style:'flex:1;min-width:0;',
        oninput(e){item.name=e.target.value;triggerSave();}
      }),
      h('button',{class:'sal-del-btn',onclick(){
        STATE.expenseData[mk2]=items.filter((_,i)=>i!==idx);
        triggerSave();renderPage();
      }},'×')
    ),
    h('div',{class:'sal-item-row2'},
      h('span',{class:'sal-nt',style:isSaving?'color:#f0d060':''},(isSaving?'💰 ':'')+'NT$'),
      h('input',{class:'sal-amt-input',type:'number',inputmode:'decimal',placeholder:'',value:item.amount,
        style:isSaving?'color:#f0d060':'',
        oninput(e){item.amount=e.target.value;triggerSave();}
      })
    )
  );

  // Desktop drag
  el.addEventListener('dragstart', e=>{expDragIdx=idx;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend', ()=>el.classList.remove('dragging'));
  el.addEventListener('dragover', e=>{e.preventDefault();el.classList.add('drag-over');});
  el.addEventListener('dragleave', ()=>el.classList.remove('drag-over'));
  el.addEventListener('drop', e=>{
    e.preventDefault();el.classList.remove('drag-over');
    if(expDragIdx===null||expDragIdx===idx)return;
    const arr=STATE.expenseData[mk2];
    const moved=arr.splice(expDragIdx,1)[0];
    arr.splice(idx,0,moved);
    expDragIdx=null;triggerSave();renderPage();
  });

  // Touch drag
  let touchStartY=0,touchClone=null,touchTargetIdx=null;
  el.addEventListener('touchstart',e=>{
    if(!e.target.closest('.drag-handle'))return;
    e.preventDefault();touchStartY=e.touches[0].clientY;expDragIdx=idx;
    el.classList.add('dragging');
    touchClone=el.cloneNode(true);
    const r=el.getBoundingClientRect();
    touchClone.style.cssText='position:fixed;z-index:9999;left:'+r.left+'px;top:'+r.top+'px;width:'+el.offsetWidth+'px;opacity:0.85;pointer-events:none;';
    document.body.appendChild(touchClone);
  },{passive:false});
  el.addEventListener('touchmove',e=>{
    if(!touchClone)return;e.preventDefault();
    const dy=e.touches[0].clientY-touchStartY;
    touchClone.style.transform='translateY('+dy+'px)';
    const elY=e.touches[0].clientY;
    el.parentElement.querySelectorAll('.sal-item').forEach((s,si)=>{
      const r2=s.getBoundingClientRect();
      if(elY>r2.top&&elY<r2.bottom){touchTargetIdx=si;s.classList.add('drag-over');}
      else s.classList.remove('drag-over');
    });
  },{passive:false});
  el.addEventListener('touchend',()=>{
    if(!touchClone)return;
    touchClone.remove();touchClone=null;
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(e2=>e2.classList.remove('drag-over'));
    if(touchTargetIdx!==null&&touchTargetIdx!==expDragIdx){
      const arr=STATE.expenseData[mk2];
      const moved=arr.splice(expDragIdx,1)[0];
      arr.splice(touchTargetIdx,0,moved);
      triggerSave();renderPage();
    }
    expDragIdx=null;touchTargetIdx=null;
  });

  return el;
}

          h('div',{class:'chart-sub'},'依類別合計，金額排序')
        ),
        h('div',{class:'bar-chart-wrap'},barEl)
      )
    );

  } else {
    // trend line chart - expense + saving two lines
    const allMonths = getMonthList().reverse().filter(m=>{
      const d2=STATE.expenseData[m.key];
      return d2 && (Array.isArray(d2)?d2.length>0:Object.values(d2).some(v=>Number(v)>0));
    });
    const chartData = allMonths.map(m=>{
      const d2=STATE.expenseData[m.key];
      let exp=0, sav=0;
      if(Array.isArray(d2)){
        d2.forEach(i=>{ if(i.catId===SAVING_CAT_ID) sav+=Number(i.amount)||0; else exp+=Number(i.amount)||0; });
      } else {
        EXP_CATS.forEach(c=>{ const v=Number(d2[c.id])||0; if(c.id===SAVING_CAT_ID) sav+=v; else exp+=v; });
      }
      return {month:m, exp, sav};
    });

    function drawDualLine(data) {
      if(data.length<1) return h('div',{class:'empty'},'尚無花費資料');
      if(data.length===1) return h('div',{class:'empty',style:'color:#aaa'},'需至少 2 個月才顯示趨勢');
      const W=320,H=180,PL=50,PR=14,PT=14,PB=28;
      const IW=W-PL-PR,IH=H-PT-PB;
      const allVals=[...data.map(d=>d.exp),...data.map(d=>d.sav)];
      const maxV=Math.max(...allVals,1),minV=Math.min(...allVals,0);
      const pad=(maxV-minV)*0.12||1000;
      const yMin=Math.max(0,minV-pad),yMax=maxV+pad;
      const xP=i=>PL+(i/(data.length-1))*IW;
      const yP=v=>PT+IH-((v-yMin)/(yMax-yMin))*IH;
      const fY=v=>v>=10000?Math.round(v/1000)+'k':fmt(v);
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('class','chart');

      // grid lines
      [yMin,(yMin+yMax)/2,yMax].forEach(v=>{
        const y=yP(v);
        const gl=document.createElementNS('http://www.w3.org/2000/svg','line');
        gl.setAttribute('x1',PL);gl.setAttribute('y1',y);gl.setAttribute('x2',W-PR);gl.setAttribute('y2',y);
        gl.setAttribute('stroke','#1e1e1e');gl.setAttribute('stroke-width','1');svg.appendChild(gl);
        const gt=document.createElementNS('http://www.w3.org/2000/svg','text');
        gt.setAttribute('x',PL-4);gt.setAttribute('y',y+4);gt.setAttribute('text-anchor','end');
        gt.setAttribute('fill','#444');gt.setAttribute('font-size','8');gt.setAttribute('font-family','monospace');
        gt.textContent=fY(v);svg.appendChild(gt);
      });

      // draw one line + dots with tooltip
      function drawLine(vals, color, label) {
        const coords=data.map((_,i)=>xP(i)+','+yP(vals[i])).join(' ');
        const area=PL+','+(PT+IH)+' '+coords+' '+xP(data.length-1)+','+(PT+IH);
        const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points',area);poly.setAttribute('fill',color+'22');svg.appendChild(poly);
        const pl2=document.createElementNS('http://www.w3.org/2000/svg','polyline');
        pl2.setAttribute('points',coords);pl2.setAttribute('fill','none');
        pl2.setAttribute('stroke',color);pl2.setAttribute('stroke-width','1.8');
        pl2.setAttribute('stroke-linejoin','round');pl2.setAttribute('stroke-linecap','round');svg.appendChild(pl2);
        let tipEl=null;
        data.forEach((d,i)=>{
          const cx=xP(i),cy=yP(vals[i]);
          const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');
          c2.setAttribute('cx',cx);c2.setAttribute('cy',cy);c2.setAttribute('r','3.5');
          c2.setAttribute('fill',color);c2.setAttribute('stroke','#0a0a0a');c2.setAttribute('stroke-width','1.5');svg.appendChild(c2);
          const hit=document.createElementNS('http://www.w3.org/2000/svg','rect');
          hit.setAttribute('x',cx-12);hit.setAttribute('y',PT);hit.setAttribute('width','24');hit.setAttribute('height',IH+PB);
          hit.setAttribute('fill','transparent');
          const showTip=()=>{
            if(tipEl)svg.removeChild(tipEl);
            const tw=100,th=42,tx=Math.min(Math.max(cx-tw/2,PL),W-PR-tw),ty=cy-th-8;
            tipEl=document.createElementNS('http://www.w3.org/2000/svg','g');
            const bg3=document.createElementNS('http://www.w3.org/2000/svg','rect');
            bg3.setAttribute('x',tx);bg3.setAttribute('y',ty);bg3.setAttribute('width',tw);bg3.setAttribute('height',th);
            bg3.setAttribute('rx','5');bg3.setAttribute('fill','#1a1a1a');bg3.setAttribute('stroke','#2a2a2a');
            const tt1=document.createElementNS('http://www.w3.org/2000/svg','text');
            tt1.setAttribute('x',tx+tw/2);tt1.setAttribute('y',ty+13);tt1.setAttribute('text-anchor','middle');
            tt1.setAttribute('fill','#aaa');tt1.setAttribute('font-size','9');tt1.textContent=d.month.label+' '+label;
            const tt2=document.createElementNS('http://www.w3.org/2000/svg','text');
            tt2.setAttribute('x',tx+tw/2);tt2.setAttribute('y',ty+30);tt2.setAttribute('text-anchor','middle');
            tt2.setAttribute('fill',color);tt2.setAttribute('font-size','12');tt2.setAttribute('font-weight','600');
            tt2.textContent='NT$ '+fmt(vals[i]);
            tipEl.appendChild(bg3);tipEl.appendChild(tt1);tipEl.appendChild(tt2);svg.appendChild(tipEl);
          };
          hit.addEventListener('mouseenter',showTip);
          hit.addEventListener('mouseleave',()=>{if(tipEl){svg.removeChild(tipEl);tipEl=null;}});
          hit.addEventListener('touchstart',e=>{e.preventDefault();showTip();},{passive:false});
          hit.addEventListener('touchend',()=>setTimeout(()=>{if(tipEl){svg.removeChild(tipEl);tipEl=null;}},1800));
          svg.appendChild(hit);
        });
      }

      drawLine(data.map(d=>d.sav),'#f0d060','存款');
      drawLine(data.map(d=>d.exp),'#e07070','花費');

      // x labels
      const step=data.length>12?Math.ceil(data.length/8):1;
      data.forEach((d,i)=>{
        if(i%step!==0&&i!==data.length-1)return;
        const xt=document.createElementNS('http://www.w3.org/2000/svg','text');
        xt.setAttribute('x',xP(i));xt.setAttribute('y',H-4);xt.setAttribute('text-anchor','middle');
        xt.setAttribute('fill','#444');xt.setAttribute('font-size','8');
        xt.textContent=d.month.key.slice(2).replace('-','/');svg.appendChild(xt);
      });

      // legend
      [['#e07070','花費'],['#f0d060','存款']].forEach(([c,l],i)=>{
        const lx=PL+i*60;
        const lr=document.createElementNS('http://www.w3.org/2000/svg','rect');
        lr.setAttribute('x',lx);lr.setAttribute('y',PT-8);lr.setAttribute('width','10');lr.setAttribute('height','4');
        lr.setAttribute('fill',c);lr.setAttribute('rx','2');svg.appendChild(lr);
        const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
        lt.setAttribute('x',lx+13);lt.setAttribute('y',PT-5);
        lt.setAttribute('fill','#666');lt.setAttribute('font-size','11');lt.textContent=l;svg.appendChild(lt);
      });
      return svg;
    }

    mainContent = h('div',{style:'display:flex;flex-direction:column;gap:12px'},
      h('div',{class:'chart-card'},
        h('div',{class:'chart-header'},
          h('div',{class:'chart-title'},'每月花費 & 存款趨勢'),
          h('div',{class:'chart-sub'},'全歷史紀錄')
        ),
        drawDualLine(chartData)
      )
    );
  }

  if (!mainContent) mainContent = h('div',{class:'empty'},'載入中...');
  return h('div',{class:'page'},configRow,subTabs,mainContent);
}

// LOCK SCREEN
// ══════════════════════════════════════════════
const LOCK_PWD = '850701';
let lockBuf = '';

function lockInput(d) {
  if (lockBuf.length >= 6) return;
  lockBuf += d;
  updateLockDots();
  if (lockBuf.length === 6) {
    if (lockBuf === LOCK_PWD) {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').classList.remove('hidden');
      renderPage();
    } else {
      document.getElementById('lock-dots').classList.add('lock-shake');
      document.querySelectorAll('.lock-dot').forEach(d2=>d2.classList.add('error'));
      setTimeout(()=>{
        lockBuf='';
        document.getElementById('lock-dots').classList.remove('lock-shake');
        document.querySelectorAll('.lock-dot').forEach(d2=>{d2.classList.remove('error','filled');});
      }, 700);
    }
  }
}
function lockDel() {
  lockBuf = lockBuf.slice(0,-1);
  updateLockDots();
}
function updateLockDots() {
  document.querySelectorAll('.lock-dot').forEach((d,i)=>{
    d.classList.toggle('filled', i < lockBuf.length);
  });
}

// PAGE: HOME (DASHBOARD)
// ══════════════════════════════════════════════
function getMonthNetIncome(mk2) {
  const d = STATE.salaryData[mk2];
  if (!d) return 0;
  const taxAdd = d.taxAdd||d.a||[], taxDed=d.taxDed||[], exempt=d.exempt||d.b||[], other=d.other||d.c||[];
  return Math.max(0,sumItems(taxAdd)-sumItems(taxDed))+sumItems(exempt)-sumItems(other);
}
// Regular income: excludes yearend + otherBonus only
function getMonthRegularIncome(mk2) {
  const d = STATE.salaryData[mk2];
  if (!d) return 0;
  const taxAdd = (d.taxAdd||d.a||[]).filter(i=>!BONUS_IDS.has(i.id));
  const taxDed = d.taxDed||[], exempt=d.exempt||d.b||[], other=d.other||d.c||[];
  return Math.max(0,sumItems(taxAdd)-sumItems(taxDed))+sumItems(exempt)-sumItems(other);
}
// Bonus income: only yearend + otherBonus
const BONUS_IDS = new Set(['yearend','otherBonus']);
function getMonthBonusIncome(mk2) {
  const d = STATE.salaryData[mk2];
  if (!d) return 0;
  const taxAdd = (d.taxAdd||d.a||[]).filter(i=>BONUS_IDS.has(i.id));
  return sumItems(taxAdd);
}

function getMonthExpense(mk2) {
  const d = STATE.expenseData[mk2];
  if (!d) return 0;
  if (Array.isArray(d)) return d.filter(i=>i.catId!==SAVING_CAT_ID).reduce((s,i)=>s+(Number(i.amount)||0),0);
  return EXP_CATS.filter(c=>c.id!==SAVING_CAT_ID).reduce((s,c)=>s+(Number(d[c.id])||0),0);
}

function renderHome() {
  const curMk = curMK();
  const year = new Date().getFullYear();
  const monthIncome = getMonthNetIncome(curMk);
  const monthExpense = getMonthExpense(curMk);
  const monthBalance = monthIncome - monthExpense;

  // Year total expense
  let yearExpense = 0;
  for(let m=1;m<=12;m++) yearExpense += getMonthExpense(mk(year,m));

  // Cumulative savings: initSavings + all 'saving' category items
  const initSv = Number(STATE.initSavings)||0;
  let cumSavings = initSv;
  const allMonths = getMonthList().reverse(); // oldest first
  allMonths.forEach(mo => {
    const d = STATE.expenseData[mo.key];
    if (!d) return;
    if (Array.isArray(d)) {
      d.filter(i=>i.catId===SAVING_CAT_ID).forEach(i=>{ cumSavings += Number(i.amount)||0; });
    }
  });

  // Monthly data for charts
  const monthlyData = allMonths.filter(mo=>{
    return getMonthNetIncome(mo.key)>0||getMonthExpense(mo.key)>0;
  }).map(mo=>({
    label: mo.key.slice(2).replace('-','/'),
    income: getMonthNetIncome(mo.key),
    regularIncome: getMonthRegularIncome(mo.key),
    bonus: getMonthBonusIncome(mo.key),
    expense: getMonthExpense(mo.key),
    saving: getMonthNetIncome(mo.key)-getMonthExpense(mo.key),
  }));

  // Total cumulative income (all history)
  const totalCumIncome = allMonths.reduce((s,mo)=>s+getMonthNetIncome(mo.key), 0);

  // Year expense by category
  const yearCatTotals = {};
  for(let m=1;m<=12;m++){
    const d=STATE.expenseData[mk(year,m)];
    if(!d) continue;
    if(Array.isArray(d)){ d.forEach(i=>{ yearCatTotals[i.catId]=(yearCatTotals[i.catId]||0)+(Number(i.amount)||0); }); }
    else { EXP_CATS.forEach(c=>{ yearCatTotals[c.id]=(yearCatTotals[c.id]||0)+(Number(d[c.id])||0); }); }
  }
  const yearCatSorted = Object.entries(yearCatTotals).map(([catId,v])=>{
    const cat=EXP_CATS.find(c=>c.id===catId)||EXP_CATS[EXP_CATS.length-1];
    return {...cat,val:v};
  }).filter(c=>c.val>0).sort((a,b)=>b.val-a.val);

  // ── summary cards ──
  const summaryCards = h('div',{class:'dash-grid'},
    h('div',{class:'dash-card accent-green'},
      h('div',{class:'dash-label'},'當月收入'),
      h('div',{class:'dash-val',style:'color:#6dd6a0'},'NT$'+fmt(monthIncome)),
      h('div',{class:'dash-sub'},curMk.replace('-','年')+'月')
    ),
    h('div',{class:'dash-card accent-red'},
      h('div',{class:'dash-label'},'當月支出'),
      h('div',{class:'dash-val',style:'color:#e07070'},'NT$'+fmt(monthExpense)),
      h('div',{class:'dash-sub'},curMk.replace('-','年')+'月')
    ),
    h('div',{class:'dash-card full',style:'border-color:'+(monthBalance>=0?'#2a4a2a':'#4a2a2a')+';background:'+(monthBalance>=0?'linear-gradient(135deg,#0d1a0d,#0a150a)':'linear-gradient(135deg,#1a0d0d,#150a0a)')},
      h('div',{class:'dash-label'},'當月餘額（收入 − 支出）'),
      h('div',{class:'dash-val',style:'font-size:26px;color:'+(monthBalance>=0?'#6dd6a0':'#e07070')},
        (monthBalance>=0?'+':'')+'NT$'+fmt(monthBalance)
      )
    ),
    h('div',{class:'dash-card full accent-gold'},
      h('div',{class:'dash-label'},'存款累計總額'),
      h('div',{class:'dash-val',style:'color:#f0c060'},'NT$'+fmt(cumSavings)),
      h('div',{style:'display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap'},
        h('span',{style:'font-size:11px;color:#555'},'起始存款：'),
        h('input',{
          type:'number',inputmode:'decimal',placeholder:'0',
          value:STATE.initSavings,
          style:'background:#1a1a00;border:1px solid #3a2c00;border-radius:6px;padding:4px 8px;color:#f0c060;font-family:monospace;font-size:13px;width:120px;',
          oninput(e){STATE.initSavings=e.target.value;triggerSave();}
        }),
        h('span',{style:'font-size:11px;color:#555'},'NT$')
      )
    ),
    h('div',{class:'dash-card full accent-red'},
      h('div',{class:'dash-label'},'年度累計花費（'+year+'年）'),
      h('div',{class:'dash-val',style:'color:#e07070'},'NT$'+fmt(yearExpense))
    ),
    h('div',{class:'dash-card full',style:'border-color:#2a3a5a;background:linear-gradient(135deg,#0d1220,#0a1018)'},
      h('div',{class:'dash-label'},'歷史總收入累積'),
      h('div',{class:'dash-val',style:'color:#70a8f0'},'NT$'+fmt(totalCumIncome)),
      h('div',{class:'dash-sub'},'自有記錄以來所有月份收入加總')
    )
  );

  // ── combo chart: monthly savings bar + line ──
  function renderComboChart(data, title, sub, barKey, lineKey, barColor, lineColor) {

      hit.addEventListener('mouseenter',showTip);
      hit.addEventListener('mouseleave',hideTip);
      hit.addEventListener('touchstart',e=>{e.preventDefault();showTip();},{passive:false});

      svg.appendChild(hit);
    });

    // x labels
    const step=data.length>12?Math.ceil(data.length/8):1;
    data.forEach((d,i)=>{
      if(i%step!==0&&i!==data.length-1)return;
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',xP(i));txt.setAttribute('y',H-4);txt.setAttribute('text-anchor','middle');
      txt.setAttribute('fill','#444');txt.setAttribute('font-size','8');
      txt.textContent=d.label;svg.appendChild(txt);
    });
    return svg;
  }

  // ── year category bar chart ──
  function renderYearCatBar() {
    if(!yearCatSorted.length) return h('div',{class:'empty'},'尚無年度花費資料');
    const W=320,barH=18,gap=5,PL=62,PR=62;

    svg.style.cssText='width:100%;height:'+H+'px;display:block;';
    yearCatSorted.forEach((item,i)=>{
      const y=i*(barH+gap)+5,bw=Math.max(2,((item.val/maxV)*(W-PL-PR)));
      const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x',PL-5);lbl.setAttribute('y',y+barH/2+4);
      lbl.setAttribute('text-anchor','end');lbl.setAttribute('fill','#aaa');lbl.setAttribute('font-size','10');
      lbl.textContent=item.name;svg.appendChild(lbl);
      const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('x',PL);bg.setAttribute('y',y);bg.setAttribute('width',W-PL-PR);bg.setAttribute('height',barH);
      bg.setAttribute('fill','#1a1a1a');bg.setAttribute('rx','3');svg.appendChild(bg);
      const bar=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bar.setAttribute('x',PL);bar.setAttribute('y',y);bar.setAttribute('width',bw);bar.setAttribute('height',barH);
      bar.setAttribute('fill',item.color);bar.setAttribute('rx','3');bar.setAttribute('opacity','0.8');svg.appendChild(bar);
      const val=document.createElementNS('http://www.w3.org/2000/svg','text');
      val.setAttribute('x',PL+bw+5);val.setAttribute('y',y+barH/2+4);
      val.setAttribute('fill','#888');val.setAttribute('font-size','9');val.setAttribute('font-family','monospace');
      val.textContent=fmt(item.val);svg.appendChild(val);
    });
    return svg;
  }

  // ── dual line chart: regular income + expense (scrollable, no annual bonus) ──
  function renderDualLineChart(data, incKey, expKey, incColor, expColor, incLabel, expLabel) {
    if(!data.length) return h('div',{class:'empty'},'尚無資料');
    // Make chart wider if many months
    const minW=360, perCol=32;
    const W=Math.max(minW, data.length*perCol+80);
    const H=220,PL=56,PR=16,PT=28,PB=36,IW=W-PL-PR,IH=H-PT-PB;
    const incVals=data.map(d=>d[incKey||'regularIncome']||0), expVals=expKey?data.map(d=>d[expKey]||0):[];
    const allVals=[...incVals,...expVals];
    const maxV=Math.max(...allVals,1), minV=0;
    const pad=maxV*0.12||1000;
    const yMax=maxV+pad, yMin=0;
    const xP=i=>PL+(data.length>1?(i/(data.length-1))*IW:IW/2);
    const yP=v=>PT+IH-((v-yMin)/(yMax-yMin))*IH;
    const fY=v=>v>=10000?Math.round(v/1000)+'k':fmt(v);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('class','chart');

    // grid
    [0,(yMax/2),yMax].forEach(v=>{
      const y=yP(v);
      const gl=document.createElementNS('http://www.w3.org/2000/svg','line');
      gl.setAttribute('x1',PL);gl.setAttribute('y1',y);gl.setAttribute('x2',W-PR);gl.setAttribute('y2',y);
      gl.setAttribute('stroke','#1a1a1a');gl.setAttribute('stroke-width','1');svg.appendChild(gl);
      const gt=document.createElementNS('http://www.w3.org/2000/svg','text');
      gt.setAttribute('x',PL-4);gt.setAttribute('y',y+4);gt.setAttribute('text-anchor','end');
      gt.setAttribute('fill','#444');gt.setAttribute('font-size','8');gt.setAttribute('font-family','monospace');
      gt.textContent=fY(v);svg.appendChild(gt);
    });

    // draw a line
    function drawLine(vals, color) {
      if(!vals||vals.length<2||!color) return;
      const coords=vals.map((v,i)=>xP(i)+','+yP(v)).join(' ');
      const pl2=document.createElementNS('http://www.w3.org/2000/svg','polyline');
      pl2.setAttribute('points',coords);pl2.setAttribute('fill','none');
      pl2.setAttribute('stroke',color);pl2.setAttribute('stroke-width','2');
      pl2.setAttribute('stroke-linejoin','round');pl2.setAttribute('stroke-linecap','round');
      svg.appendChild(pl2);
      vals.forEach((v,i)=>{
        const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c2.setAttribute('cx',xP(i));c2.setAttribute('cy',yP(v));c2.setAttribute('r','3.5');
        c2.setAttribute('fill',color);c2.setAttribute('stroke','#0a0a0a');c2.setAttribute('stroke-width','1.5');
        svg.appendChild(c2);
      });
    }
    if(expVals.length) drawLine(expVals,expColor||'#e07070');
    drawLine(incVals,incColor||'#6dd6a0');

    // tooltips (hit area per column)
    let tipEl=null;
    data.forEach((d,i)=>{
      const cx=xP(i);
      const hit=document.createElementNS('http://www.w3.org/2000/svg','rect');
      hit.setAttribute('x',cx-16);hit.setAttribute('y',PT);
      hit.setAttribute('width','32');hit.setAttribute('height',IH+PB);
      hit.setAttribute('fill','transparent');
      const showTip=()=>{
        if(tipEl) svg.removeChild(tipEl);
        const tw=118,th=56,tx=Math.min(Math.max(cx-tw/2,PL),W-PR-tw);
        const ty=Math.max(PT,yP(Math.max(incVals[i],expVals[i]))-th-8);
        tipEl=document.createElementNS('http://www.w3.org/2000/svg','g');
        const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
        bg.setAttribute('x',tx);bg.setAttribute('y',ty);bg.setAttribute('width',tw);bg.setAttribute('height',th);
        bg.setAttribute('rx','5');bg.setAttribute('fill','#1e1e1e');bg.setAttribute('stroke','#333');
        const tl=document.createElementNS('http://www.w3.org/2000/svg','text');
        tl.setAttribute('x',tx+tw/2);tl.setAttribute('y',ty+13);tl.setAttribute('text-anchor','middle');
        tl.setAttribute('fill','#aaa');tl.setAttribute('font-size','9');tl.textContent=d.label;
        const ti=document.createElementNS('http://www.w3.org/2000/svg','text');
        ti.setAttribute('x',tx+8);ti.setAttribute('y',ty+29);
        ti.setAttribute('fill','#6dd6a0');ti.setAttribute('font-size','9');ti.setAttribute('font-family','monospace');
        ti.textContent='收入 NT$'+fmt(incVals[i]);
        const te=document.createElementNS('http://www.w3.org/2000/svg','text');
        te.setAttribute('x',tx+8);te.setAttribute('y',ty+44);
        te.setAttribute('fill','#e07070');te.setAttribute('font-size','9');te.setAttribute('font-family','monospace');
        te.textContent='支出 NT$'+fmt(expVals[i]);
        tipEl.appendChild(bg);tipEl.appendChild(tl);tipEl.appendChild(ti);tipEl.appendChild(te);
        svg.appendChild(tipEl);
      };
      const hideTip=()=>{if(tipEl){svg.removeChild(tipEl);tipEl=null;}};
      hit.addEventListener('mouseenter',showTip);
      hit.addEventListener('mouseleave',hideTip);
      hit.addEventListener('touchstart',e=>{e.preventDefault();showTip();},{passive:false});
      hit.addEventListener('touchend',()=>setTimeout(hideTip,1800));
      svg.appendChild(hit);
    });

    // x labels
    const step=data.length>12?Math.ceil(data.length/8):1;
    data.forEach((d,i)=>{
      if(i%step!==0&&i!==data.length-1)return;
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',xP(i));txt.setAttribute('y',H-4);txt.setAttribute('text-anchor','middle');
      txt.setAttribute('fill','#444');txt.setAttribute('font-size','8');txt.textContent=d.label;svg.appendChild(txt);
    });

    // legend
    ([[incColor||'#6dd6a0',incLabel||'收入']]+(expKey&&expLabel?[,[expColor||'#e07070',expLabel]]:[])).flat(1).filter(Boolean).reduce((a,v,i)=>{if(i%2===0)a.push([v]);else a[a.length-1].push(v);return a;},[]).forEach(([c,l],i)=>{
      const lx=PL+i*54;
      const lr=document.createElementNS('http://www.w3.org/2000/svg','rect');
      lr.setAttribute('x',lx);lr.setAttribute('y',PT-10);lr.setAttribute('width','12');lr.setAttribute('height','3');
      lr.setAttribute('fill',c);lr.setAttribute('rx','2');svg.appendChild(lr);
      const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',lx+15);lt.setAttribute('y',PT-7);lt.setAttribute('fill','#666');lt.setAttribute('font-size','9');
      lt.textContent=l;svg.appendChild(lt);
    });

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'overflow-x:auto;-webkit-overflow-scrolling:touch;';
    wrapper.appendChild(svg);
    return wrapper;
  }

  const incExpChartCard = monthlyData.length>0 ? h('div',{class:'chart-card'},
    h('div',{class:'chart-header'},
      h('div',{class:'chart-title'},'每月收支變化'),
      h('div',{class:'chart-sub'},'不含年終獎金 ｜ 左右滑動')
    ),
    renderDualLineChart(monthlyData,'regularIncome','expense','#6dd6a0','#e07070','經常收入','支出')
  ) : null;

  // Bonus chart: only months that have bonus
  const bonusData = monthlyData.filter(d=>d.bonus>0);
  const bonusChartCard = bonusData.length>0 ? h('div',{class:'chart-card'},
    h('div',{class:'chart-header'},
      h('div',{class:'chart-title'},'年終 & 績效獎金'),
      h('div',{class:'chart-sub'},'僅含年終獎金 & 其他獎金')
    ),
    renderDualLineChart(bonusData,'bonus',null,'#f0c060',null,'獎金',null)
  ) : null;

  const expenseChartCard = null;

  const yearCatCard = yearCatSorted.length>0 ? h('div',{class:'chart-card'},
    h('div',{class:'chart-header'},
      h('div',{class:'chart-title'},year+'年度各類花費分析'),
      h('div',{class:'chart-sub'},'依類別累計')
    ),
    h('div',{class:'bar-chart-wrap'},renderYearCatBar())
  ) : null;

  return h('div',{class:'page'},
    summaryCards,
    incExpChartCard,
    bonusChartCard,
    yearCatCard
  );
}

// ══════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════
function showPage(p) {
  STATE.page=p;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['home','ot','salary','annual','expense'][i]===p);
  });
  renderPage();
}

function renderPage() {
  const main=document.getElementById('main-content');
  main.innerHTML='';
  let el;
  try {
    if(STATE.page==='home') el=renderHome();
    else if(STATE.page==='ot') el=renderOT();
    else if(STATE.page==='salary') el=renderSalary();
    else if(STATE.page==='annual') el=renderAnnual();
    else el=renderExpense();
    main.appendChild(el);
  } catch(err) {
    console.error('renderPage error:', err);
    main.appendChild(h('div',{style:'color:#e07070;padding:20px;font-family:monospace;font-size:12px'},
      '⚠️ 渲染錯誤：'+err.message
    ));
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function migrateAllSalaryData() {
  Object.keys(STATE.salaryData).forEach(key => {
    const d = STATE.salaryData[key];
    if (!d) return;
    // Migrate old a/b/c format
    if (d.a && !d.taxAdd) { d.taxAdd = d.a; delete d.a; }
    if (d.b && !d.exempt)  { d.exempt  = d.b; delete d.b; }
    if (d.c && !d.other)   { d.other   = d.c; delete d.c; }
    // Ensure all fields exist with defaults
    if (!d.taxAdd || !Array.isArray(d.taxAdd)) d.taxAdd = DEF_TAX_ADD.map(i=>({...i}));
    if (!d.taxDed || !Array.isArray(d.taxDed)) d.taxDed = DEF_TAX_DED.map(i=>({...i}));
    if (!d.exempt || !Array.isArray(d.exempt)) d.exempt = DEF_EXEMPT.map(i=>({...i}));
    if (!d.other  || !Array.isArray(d.other))  d.other  = DEF_OTHER.map(i=>({...i}));
  });
  // Save migrated data back
  dbSet('st_salaryData', STATE.salaryData);
}

window.addEventListener('DOMContentLoaded', async () => {
  // First load from localStorage cache (instant)
  const salCache  = LS.get('st_salary');
  const otrCache  = LS.get('st_otRecords');
  const saldCache = LS.get('st_salaryData');
  const expdCache = LS.get('st_expenseData');
  const initSvCache = LS.get('st_initSavings');
  if (salCache !== null) STATE.salary = salCache;
  if (otrCache !== null) STATE.otRecords = otrCache;
  if (saldCache !== null) STATE.salaryData = saldCache;
  if (expdCache !== null) STATE.expenseData = expdCache;
  if (initSvCache !== null) STATE.initSavings = initSvCache;

  try {
    const [sal, otr, sald, expd, initSv] = await Promise.all([
      dbGet('st_salary'),
      dbGet('st_otRecords'),
      dbGet('st_salaryData'),
      dbGet('st_expenseData'),
      dbGet('st_initSavings'),
    ]);
    if (sal !== null) STATE.salary = sal;
    if (otr !== null) STATE.otRecords = otr;
    if (sald !== null) STATE.salaryData = sald;
    if (expd !== null) STATE.expenseData = expd;
    if (initSv !== null) STATE.initSavings = initSv;
  } catch {}

  migrateAllSalaryData();

  document.getElementById('loading').classList.add('hidden');
  // Show lock screen (not app yet)
  document.getElementById('lock-screen').style.display = 'flex';
});
</script>
